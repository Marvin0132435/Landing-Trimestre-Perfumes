<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">

  <!-- Fondo oscuro -->
  <rect width="100" height="100" rx="8" fill="#0d0a0e"/>

  <!-- Marco decorativo exterior -->
  <rect x="7" y="7" width="86" height="86" rx="4" fill="none" stroke="#c9a84c" stroke-width="0.6" opacity="0.35"/>

  <!-- Cuerpo del frasco -->
  <rect x="32" y="42" width="36" height="44" rx="5" fill="none" stroke="#c9a84c" stroke-width="1.5"/>

  <!-- Reflejo lateral -->
  <rect x="37" y="47" width="5" height="34" rx="2.5" fill="#c9a84c" opacity="0.15"/>

  <!-- Etiqueta -->
  <rect x="38" y="54" width="24" height="18" rx="1" fill="none" stroke="#c9a84c" stroke-width="0.6" opacity="0.55"/>
  <line x1="42" y1="60" x2="58" y2="60" stroke="#c9a84c" stroke-width="0.7" opacity="0.65"/>
  <line x1="44" y1="65" x2="56" y2="65" stroke="#c9a84c" stroke-width="0.7" opacity="0.35"/>

  <!-- Cuello -->
  <rect x="38" y="28" width="24" height="16" rx="2" fill="none" stroke="#c9a84c" stroke-width="1.5"/>

  <!-- Tapa -->
  <rect x="34" y="17" width="32" height="13" rx="5" fill="#c9a84c"/>
  <rect x="38" y="20" width="10" height="7" rx="2" fill="rgba(255,255,255,0.12)"/>

  <!-- Boquilla -->
  <rect x="48" y="8" width="5" height="11" rx="2.5" fill="#c9a84c"/>

  <!-- Sombra base -->
  <rect x="28" y="85" width="44" height="2" rx="1" fill="#c9a84c" opacity="0.2"/>

  <!-- Pequeños detalles laterales -->
  <line x1="24" y1="58" x2="30" y2="58" stroke="#c9a84c" stroke-width="0.8" opacity="0.4"/>
  <line x1="70" y1="58" x2="76" y2="58" stroke="#c9a84c" stroke-width="0.8" opacity="0.4"/>
  <line x1="24" y1="66" x2="30" y2="66" stroke="#c9a84c" stroke-width="0.8" opacity="0.25"/>
  <line x1="70" y1="66" x2="76" y2="66" stroke="#c9a84c" stroke-width="0.8" opacity="0.25"/>

  <!-- Rombo decorativo arriba -->
  <polygon points="50,4 53,7 50,10 47,7" fill="#c9a84c" opacity="0.5"/>

</svg>
